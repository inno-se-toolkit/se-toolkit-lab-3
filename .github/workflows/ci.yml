name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    
    services:
      db:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: lab3
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 42002:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    env:
      API_TOKEN: "test-token-for-ci"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:42002/lab3"
      POSTGRES_HOST_PORT: "42002"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run linter
        run: uv run poe lint

      - name: Run type checker
        run: uv run poe typecheck

      - name: Init Database
        run: |
          uv run python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from sqlalchemy import text
          async def init():
              engine = create_async_engine('$DATABASE_URL')
              async with engine.begin() as conn:
                  await conn.execute(text('CREATE TABLE IF NOT EXISTS outcomes (id SERIAL PRIMARY KEY, learner_id INT, item_id INT, status TEXT, created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP)'))
          asyncio.run(init())"

      - name: Run tests with dev server
        run: |
          uv run poe dev &
          sleep 5
          uv run poe test